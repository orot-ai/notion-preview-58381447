<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><script src="https://cdn.tailwindcss.com"></script>
<style>
body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  transition: background-color 0.8s ease;
}

body.work-mode {
  background: linear-gradient(135deg, #0f0f23, #1a1a3e);
}

body.break-mode {
  background: linear-gradient(135deg, #0a2e1f, #1a3e2e);
}

.timer-container {
  text-align: center;
  color: white;
}

.mode-label {
  font-size: 14px;
  text-transform: uppercase;
  letter-spacing: 4px;
  opacity: 0.7;
  margin-bottom: 32px;
}

.circle-wrapper {
  position: relative;
  width: 280px;
  height: 280px;
  margin: 0 auto 40px;
}

.circle-bg {
  fill: none;
  stroke: rgba(255,255,255,0.1);
  stroke-width: 6;
}

.circle-progress {
  fill: none;
  stroke-width: 6;
  stroke-linecap: round;
  transition: stroke-dashoffset 1s linear, stroke 0.8s ease;
  transform: rotate(-90deg);
  transform-origin: center;
}

.circle-progress.work {
  stroke: #e17055;
}

.circle-progress.break {
  stroke: #00b894;
}

.time-display {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 56px;
  font-weight: 200;
  letter-spacing: 4px;
  font-variant-numeric: tabular-nums;
}

.controls {
  display: flex;
  gap: 16px;
  justify-content: center;
  margin-bottom: 24px;
}

.btn {
  padding: 12px 32px;
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 50px;
  background: rgba(255,255,255,0.08);
  color: white;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  backdrop-filter: blur(10px);
  transition: all 0.3s ease;
  letter-spacing: 1px;
}

.btn:hover {
  background: rgba(255,255,255,0.15);
  transform: translateY(-2px);
}

.btn.primary {
  background: rgba(225, 112, 85, 0.3);
  border-color: rgba(225, 112, 85, 0.5);
}

.btn.primary.break-btn {
  background: rgba(0, 184, 148, 0.3);
  border-color: rgba(0, 184, 148, 0.5);
}

.session-count {
  font-size: 13px;
  opacity: 0.5;
  letter-spacing: 2px;
}
</style>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head><body><div id="root"></div><script type="text/babel" data-presets="react,typescript">
const { useState, useEffect, useCallback } = React;

const WORK_TIME = 25 * 60;
const BREAK_TIME = 5 * 60;
const CIRCUMFERENCE = 2 * Math.PI * 125;

function App() {
  const [seconds, setSeconds] = useState(WORK_TIME);
  const [isRunning, setIsRunning] = useState(false);
  const [isWork, setIsWork] = useState(true);
  const [sessions, setSessions] = useState(0);

  const totalTime = isWork ? WORK_TIME : BREAK_TIME;
  const progress = seconds / totalTime;
  const offset = CIRCUMFERENCE * (1 - progress);

  const formatTime = (s) => {
    const m = Math.floor(s / 60).toString().padStart(2, '0');
    const sec = (s % 60).toString().padStart(2, '0');
    return `${m}:${sec}`;
  };

  useEffect(() => {
    document.body.className = isWork ? 'work-mode' : 'break-mode';
  }, [isWork]);

  useEffect(() => {
    if (!isRunning) return;
    const id = setInterval(() => {
      setSeconds(prev => {
        if (prev <= 1) {
          setIsRunning(false);
          if (isWork) {
            setSessions(s => s + 1);
            setIsWork(false);
            return BREAK_TIME;
          } else {
            setIsWork(true);
            return WORK_TIME;
          }
        }
        return prev - 1;
      });
    }, 1000);
    return () => clearInterval(id);
  }, [isRunning, isWork]);

  const reset = () => {
    setIsRunning(false);
    setSeconds(isWork ? WORK_TIME : BREAK_TIME);
  };

  const skip = () => {
    setIsRunning(false);
    if (isWork) {
      setIsWork(false);
      setSeconds(BREAK_TIME);
    } else {
      setIsWork(true);
      setSeconds(WORK_TIME);
    }
  };

  return (
    <div className="timer-container">
      <div className="mode-label">{isWork ? '🔥 집중 시간' : '🌿 휴식 시간'}</div>
      <div className="circle-wrapper">
        <svg width="280" height="280" viewBox="0 0 280 280">
          <circle className="circle-bg" cx="140" cy="140" r="125" />
          <circle
            className={`circle-progress ${isWork ? 'work' : 'break'}`}
            cx="140" cy="140" r="125"
            strokeDasharray={CIRCUMFERENCE}
            strokeDashoffset={offset}
          />
        </svg>
        <div className="time-display">{formatTime(seconds)}</div>
      </div>
      <div className="controls">
        <button className="btn" onClick={reset}>리셋</button>
        <button
          className={`btn primary ${!isWork ? 'break-btn' : ''}`}
          onClick={() => setIsRunning(!isRunning)}
        >
          {isRunning ? '정지' : '시작'}
        </button>
        <button className="btn" onClick={skip}>스킵</button>
      </div>
      <div className="session-count">완료한 세션: {sessions}</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body></html>
